version: "3.8"

services:
  # Reverse Proxy
  traefik:
    image: traefik:v2.10
    container_name: echoes_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - echoes_net

  db:
    image: postgres:15-alpine
    container_name: echoes_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: echoes_bathala_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - echoes_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d echoes_bathala_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_pubsub:
    image: redis:7-alpine
    container_name: echoes_redis_pubsub
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--requirepass",
        "${REDIS_PUBSUB_PASSWORD}",
      ]
    ports:
      - "6379:6379"
    networks:
      - echoes_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PUBSUB_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis_buffer:
    image: redis:7-alpine
    container_name: echoes_redis_buffer
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_BUFFER_PASSWORD}",
      ]
    ports:
      - "6380:6379"
    networks:
      - echoes_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_BUFFER_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Logging
  seq:
    image: datalust/seq:latest
    container_name: echoes_seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "8081:80"
      - "5341:5341"
    volumes:
      - seq_data:/data
    networks:
      - echoes_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/Backend/Echoes.API/Dockerfile
    container_name: echoes_api
    depends_on:
      db:
        condition: service_healthy
      redis_pubsub:
        condition: service_healthy
      redis_buffer:
        condition: service_healthy
      seq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=echoes_bathala_db;Username=admin;Password=${POSTGRES_PASSWORD}
      - ConnectionString__RedisPubSub=redis_pubsub:6379,password=${REDIS_PUBSUB_PASSWORD}
      - ConnectionString__RedisBuffer=redis_buffer:6379,password=${REDIS_BUFFER_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}
      - Seq__ServerUrl=http://seq:5341
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.echoes_api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.services.echoes_api.loadbalancer.server.port=80"
    networks:
      - echoes_net

  game_server:
    build:
      context: ./backend
      dockerfile: src/Backend/Echoes.GameServer/Dockerfile
    container_name: echoes_game_server
    depends_on:
      redis_pubsub:
        condition: service_healthy
      redis_buffer:
        condition: service_healthy
      seq:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionString__RedisPubSub=redis_pubsub:6379,password=${REDIS_PUBSUB_PASSWORD}
      - ConnectionString__RedisBuffer=redis_buffer:6379,password=${REDIS_BUFFER_PASSWORD}
      - Seq__ServerUrl=http://seq:5341
    ports:
      - "7777:7777/udp"
      - "7777:7777/tcp"
    networks:
      - echoes_net

  persistence_worker:
    build:
      context: ./backend
      dockerfile: src/Backend/Echoes.PersistenceWorker/Dockerfile
    container_name: echoes_persistence_worker
    depends_on:
      db:
        condition: service_healthy
      redis_buffer:
        condition: service_healthy
      seq:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=echoes_bathala_db;Username=admin;Password=${POSTGRES_PASSWORD}
      - ConnectionString__RedisBuffer=redis_buffer:6379,password=${REDIS_BUFFER_PASSWORD}
      - Seq__ServerUrl=http://seq:5341
    networks:
      - echoes_net

  crypto_worker:
    build:
      context: ./backend
      dockerfile: src/Backend/Echoes.CryptoWorker/Dockerfile
    container_name: echoes_crypto_worker
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_healthy
      blockchain:
        condition: service_started
    environment:
      - DOTNET_ENVIRONMENT=Development
      - BlockchainSettings__RpcUrl=http://blockchain:8545
      - ConnectionStrings__DefaultConnection=Host=db;Database=echoes_bathala_db;Username=admin;Password=${POSTGRES_PASSWORD}
      - Seq__ServerUrl=http://seq:5341
    networks:
      - echoes_net

  # Only for dev second option for october testing
  blockchain:
    build:
      context: ./blockchain
    container_name: echoes_chain
    ports:
      - "8545:8545"
    networks:
      - echoes_net

volumes:
  postgres_data:
  seq_data:

networks:
  echoes_net:
    driver: bridge
